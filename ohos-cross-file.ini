[binaries]
c = '/data/service/hnp/bin/aarch64-unknown-linux-ohos-clang'
cpp = '/data/service/hnp/bin/aarch64-unknown-linux-ohos-clang++'
ar = '/data/service/hnp/bin/ar'
ranlib = '/data/service/hnp/bin/ranlib'
strip = '/data/service/hnp/bin/strip'

[built-in options]
c_args = ['--sysroot=/data/service/hnp/ohos-sdk.org/ohos-sdk_26.0.0.18/ohos/native/sysroot', '-O2', '-fPIC']
c_link_args = ['--sysroot=/data/service/hnp/ohos-sdk.org/ohos-sdk_26.0.0.18/ohos/native/sysroot']
cpp_args = ['--sysroot=/data/service/hnp/ohos-sdk.org/ohos-sdk_26.0.0.18/ohos/native/sysroot', '-O2', '-fPIC']
cpp_link_args = ['--sysroot=/data/service/hnp/ohos-sdk.org/ohos-sdk_26.0.0.18/ohos/native/sysroot']

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'
